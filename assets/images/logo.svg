<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Ícone das mãos com crianças -->
  <g transform="translate(0,0)">
    <!-- Mão esquerda -->
    <path d="M18 52 C14 44 10 36 12 28 C14 22 18 20 22 22 C24 18 28 16 32 18 C34 14 38 13 42 16 C44 12 48 12 52 16 C54 20 52 28 50 34 L42 52 Z"
          fill="#1B6FAF" opacity="0.15"/>
    <!-- Mão direita (espelhada) -->
    <path d="M62 52 C66 44 70 36 68 28 C66 22 62 20 58 22 C56 18 52 16 48 18 C46 14 42 13 38 16 C36 12 32 12 28 16 C26 20 28 28 30 34 L38 52 Z"
          fill="#1B6FAF" opacity="0.15"/>

    <!-- Mão esquerda principal -->
    <path d="M16 58 C10 48 8 36 10 26 C12 18 18 14 24 18 C26 12 32 10 38 14"
          stroke="#1B6FAF" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Mão direita principal -->
    <path d="M64 58 C70 48 72 36 70 26 C68 18 62 14 56 18 C54 12 48 10 42 14"
          stroke="#1B6FAF" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Palmas curvadas -->
    <path d="M16 58 Q40 68 64 58" stroke="#1B6FAF" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Estrelas/crianças no centro -->
    <g transform="translate(40, 32)">
      <!-- Estrela central -->
      <path d="M0,-10 L2.2,-3 L9.5,-3 L3.8,1.5 L5.9,8.5 L0,4.5 L-5.9,8.5 L-3.8,1.5 L-9.5,-3 L-2.2,-3 Z"
            fill="#F5C518" transform="scale(0.8)"/>
      <!-- Estrela esquerda -->
      <path d="M-14,-5 L-12.5,-1.5 L-9,-1.5 L-11.5,0.8 L-10.5,4.2 L-14,2.2 L-17.5,4.2 L-16.5,0.8 L-19,-1.5 L-15.5,-1.5 Z"
            fill="#F5C518" transform="scale(0.6)"/>
      <!-- Estrela direita -->
      <path d="M14,-5 L15.5,-1.5 L19,-1.5 L16.5,0.8 L17.5,4.2 L14,2.2 L10.5,4.2 L11.5,0.8 L9,-1.5 L12.5,-1.5 Z"
            fill="#F5C518" transform="scale(0.6)"/>
    </g>
  </g>

  <!-- Texto: Mãos Pequenas -->
  <text x="88" y="36"
        font-family="'Nunito', 'Segoe UI', Arial, sans-serif"
        font-weight="800"
        font-size="26"
        fill="#1B6FAF"
        letter-spacing="-0.5">Mãos Pequenas</text>

  <!-- Subtítulo: LAR ASSISTENCIAL -->
  <text x="89" y="54"
        font-family="'Open Sans', 'Segoe UI', Arial, sans-serif"
        font-weight="600"
        font-size="10"
        fill="#6B7280"
        letter-spacing="3">LAR ASSISTENCIAL</text>
</svg>
